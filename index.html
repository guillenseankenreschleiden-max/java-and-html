<div class="todo-container">
  <h1>Daily Motivational Quotes</h1>
  <p id="progress"></p>

  <ul class="quote-list">

    <li><label><input type="checkbox" data-id="1"><span class="quote-text">Believe you can and you're halfway there.</span></label></li>
    <li><label><input type="checkbox" data-id="2"><span class="quote-text">Your only limit is your mind.</span></label></li>
    <li><label><input type="checkbox" data-id="3"><span class="quote-text">Small progress is still progress.</span></label></li>
    <li><label><input type="checkbox" data-id="4"><span class="quote-text">Push yourself, because no one else is going to do it for you.</span></label></li>
    <li><label><input type="checkbox" data-id="5"><span class="quote-text">Dream it. Wish it. Do it.</span></label></li>
    <li><label><input type="checkbox" data-id="6"><span class="quote-text">Success doesn’t just find you. You have to go out and get it.</span></label></li>
    <li><label><input type="checkbox" data-id="7"><span class="quote-text">Don’t stop when you’re tired. Stop when you’re done.</span></label></li>
    <li><label><input type="checkbox" data-id="8"><span class="quote-text">The harder you work for something, the greater you'll feel when you achieve it.</span></label></li>
    <li><label><input type="checkbox" data-id="9"><span class="quote-text">Wake up with determination. Go to bed with satisfaction.</span></label></li>
    <li><label><input type="checkbox" data-id="10"><span class="quote-text">Do something today that your future self will thank you for.</span></label></li>
    <li><label><input type="checkbox" data-id="11"><span class="quote-text">Little things make big days.</span></label></li>
    <li><label><input type="checkbox" data-id="12"><span class="quote-text">It always seems impossible until it’s done.</span></label></li>
    <li><label><input type="checkbox" data-id="13"><span class="quote-text">Don’t wait for opportunity. Create it.</span></label></li>
    <li><label><input type="checkbox" data-id="14"><span class="quote-text">Sometimes later becomes never. Do it now.</span></label></li>
    <li><label><input type="checkbox" data-id="15"><span class="quote-text">Great things never come from comfort zones.</span></label></li>
    <li><label><input type="checkbox" data-id="16"><span class="quote-text">Stay positive. Work hard. Make it happen.</span></label></li>
    <li><label><input type="checkbox" data-id="17"><span class="quote-text">Don’t limit your challenges. Challenge your limits.</span></label></li>
    <li><label><input type="checkbox" data-id="18"><span class="quote-text">Doubt kills more dreams than failure ever will.</span></label></li>
    <li><label><input type="checkbox" data-id="19"><span class="quote-text">It’s going to be hard, but hard does not mean impossible.</span></label></li>
    <li><label><input type="checkbox" data-id="20"><span class="quote-text">Discipline is choosing between what you want now and what you want most.</span></label></li>
    <li><label><input type="checkbox" data-id="21"><span class="quote-text">The key to success is to focus on goals, not obstacles.</span></label></li>
    <li><label><input type="checkbox" data-id="22"><span class="quote-text">Your future is created by what you do today.</span></label></li>
    <li><label><input type="checkbox" data-id="23"><span class="quote-text">Start where you are. Use what you have. Do what you can.</span></label></li>
    <li><label><input type="checkbox" data-id="24"><span class="quote-text">Success is the sum of small efforts repeated daily.</span></label></li>
    <li><label><input type="checkbox" data-id="25"><span class="quote-text">Action is the foundational key to all success.</span></label></li>
    <li><label><input type="checkbox" data-id="26"><span class="quote-text">Make each day your masterpiece.</span></label></li>
    <li><label><input type="checkbox" data-id="27"><span class="quote-text">Opportunities don’t happen. You create them.</span></label></li>
    <li><label><input type="checkbox" data-id="28"><span class="quote-text">Success begins with self-belief.</span></label></li>
    <li><label><input type="checkbox" data-id="29"><span class="quote-text">Stay focused and never give up.</span></label></li>
    <li><label><input type="checkbox" data-id="30"><span class="quote-text">Consistency is what transforms average into excellence.</span></label></li>
    <li><label><input type="checkbox" data-id="31"><span class="quote-text">You are capable of more than you know.</span></label></li>
